name: Nova-Download

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: "Direct download URL"
        required: true
        type: string

      output_name:
        description: "Base name for output parts"
        required: false
        default: "Nova_file"
        type: string

      clean_Nova:
        description: "Delete Nova folder before downloading?"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  stream-download-split-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean Nova folder
        if: ${{ inputs.clean_Nova }}
        run: |
          echo "Cleaning Nova folder..."
          git rm -r --cached Nova || true   # حذف از Git
          rm -rf Nova                        # حذف فیزیکی

      - name: Create Nova folder
        run: mkdir -p Nova

      - name: Stream download and split into 90MB parts
        run: |
          set -euo pipefail
          echo "Starting stream download and split..."
          curl -L --fail --retry 3 "${{ inputs.download_url }}" | split \
            -b 90M -d -a 4 - "Nova/${{ inputs.output_name }}.part_"
          echo "Generated parts:"
          ls -lh Nova

      - name: Commit and push files in batches
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BATCH_SIZE=5
          COUNT=0
          BATCH=1
          files=(Nova/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No files found in Nova."
            exit 0
          fi

          for file in "${files[@]}"; do
            git add "$file"
            COUNT=$((COUNT + 1))

            if [ "$COUNT" -ge "$BATCH_SIZE" ]; then
              if ! git diff --cached --quiet; then
                git commit -m "Add streamed parts batch $BATCH"
                git push
              fi
              COUNT=0
              BATCH=$((BATCH + 1))
            fi
          done

          if ! git diff --cached --quiet; then
            git commit -m "Add streamed parts batch $BATCH"
            git push
          fi
