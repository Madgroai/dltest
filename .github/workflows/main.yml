name: Check Disk Space

on:
  workflow_dispatch:

jobs:
  check-disk-space:
    runs-on: ubuntu-latest

    steps:
      - name: Show disk space
        run: |
          echo "=== Disk space overview ==="
          df -h

          echo ""
          echo "=== Root filesystem usage ==="
          df -h /

          echo ""
          echo "=== Workspace usage ==="
          du -sh "$GITHUB_WORKSPACE" 2>/dev/null || true

          echo ""
          echo "=== Largest folders in / ==="
          sudo du -h --max-depth=1 / 2>/dev/null | sort -hr | head -n 20

          echo ""
          echo "=== Largest folders in /opt ==="
          sudo du -h --max-depth=1 /opt 2>/dev/null | sort -hr | head -n 20

          echo ""
          echo "=== Largest folders in /usr/local ==="
          sudo du -h --max-depth=1 /usr/local 2>/dev/null | sort -hr | head -n 20

          echo ""
          echo "=== Docker disk usage ==="
          docker system df || true
